<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plats Marocains — Saveurs et Traditions | Royaume du Maroc</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --terracotta: #C0552A;
      --terracotta-dark: #9C4520;
      --sable: #F5E6C8;
      --sable-fonce: #E9D6AE;
      --vert: #2D5016;
      --vert-fonce: #1F2A1A;
      --or: #D4AF37;
      --or-fonce: #B8961F;
      --encre: #1A1A1A;
      --texte: #444;
      --ease-doux: cubic-bezier(.2,.8,.2,1);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Lato', sans-serif;
      color: var(--texte);
      background-color: #FBF8F1;
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }
    h1,h2,h3,h4 { font-family: 'Playfair Display', serif; color: var(--encre); }
    a { color: var(--terracotta); }

    .top-bar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(251,248,241,0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      padding: 0.9rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .top-bar a.brand {
      display: inline-flex; align-items: center; gap: 0.6rem;
      color: var(--encre); text-decoration: none;
      font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.15rem;
    }
    .top-bar a.brand i { color: var(--terracotta); font-size: 1.3rem; }
    .top-bar .back-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: var(--texte); text-decoration: none; font-size: 0.92rem; font-weight: 700;
      padding: 0.45rem 0.9rem; border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.12); background: #fff;
      transition: background .2s, border-color .2s, color .2s;
    }
    .top-bar .back-link:hover { background: var(--terracotta); color: #fff; border-color: var(--terracotta); }

    .dishes-hero {
      padding: 5rem 1.5rem 3rem; text-align: center;
      background: radial-gradient(ellipse at top, rgba(212,175,55,0.15), transparent 60%), var(--sable);
    }
    .dishes-hero .eyebrow {
      display: inline-flex; align-items: center; gap: 0.6rem;
      color: var(--terracotta); font-weight: 700; letter-spacing: 0.22em;
      text-transform: uppercase; font-size: 0.78rem; margin-bottom: 1rem;
    }
    .dishes-hero .eyebrow::before,.dishes-hero .eyebrow::after {
      content:""; width:32px; height:1px; background:var(--terracotta);
    }
    .dishes-hero h1 { margin: 0 0 0.6rem; font-size: clamp(2.2rem,5vw,3.6rem); letter-spacing: -0.01em; }
    .dishes-hero p.lead { max-width:640px; margin:0 auto 2.4rem; font-size:1.05rem; color:var(--texte); font-style:italic; }

    .search-wrap { max-width:560px; margin:0 auto; position:relative; }
    .search-wrap i.bi-search {
      position:absolute; left:1.2rem; top:50%; transform:translateY(-50%);
      color:rgba(0,0,0,0.4); font-size:1.05rem; pointer-events:none; transition:color .2s;
    }
    .search-wrap input {
      width:100%; padding:1.05rem 3rem 1.05rem 3rem;
      border:1.5px solid rgba(0,0,0,0.08); border-radius:999px; background:#fff;
      font-family:'Lato',sans-serif; font-size:1rem; color:var(--encre);
      outline:none; box-shadow:0 4px 18px rgba(0,0,0,0.06);
      transition:border-color .25s,box-shadow .25s;
    }
    .search-wrap input::placeholder { color:rgba(0,0,0,0.35); }
    .search-wrap input:focus { border-color:var(--terracotta); box-shadow:0 6px 28px rgba(192,85,42,0.18); }
    .search-wrap:focus-within i.bi-search { color:var(--terracotta); }
    .search-clear {
      position:absolute; right:1rem; top:50%; transform:translateY(-50%);
      border:none; background:transparent; color:rgba(0,0,0,0.4); font-size:1.2rem;
      cursor:pointer; padding:0.2rem 0.5rem; opacity:0; pointer-events:none;
      transition:opacity .2s,color .2s;
    }
    .search-clear.visible { opacity:1; pointer-events:auto; }
    .search-clear:hover { color:var(--terracotta); }
    .search-count { text-align:center; margin-top:1rem; font-size:0.85rem; color:rgba(0,0,0,0.55); }

    .dishes-section { padding: 4rem 1.5rem 6rem; }
    .dishes-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
      gap:1.8rem; max-width:1280px; margin:0 auto;
    }

    /* === Dish Card === */
    .dish-card {
      position:relative; background:#fff; border-radius:22px; overflow:hidden;
      cursor:pointer; box-shadow:0 6px 22px rgba(0,0,0,0.07);
      transition:transform .45s var(--ease-doux), box-shadow .45s var(--ease-doux), opacity .35s ease;
      display:flex; flex-direction:column;
    }
    .dish-card.hidden { opacity:0; transform:scale(0.96); pointer-events:none; position:absolute; width:0;height:0;padding:0;margin:0;overflow:hidden; }
    .dish-card:hover { transform:translateY(-7px); box-shadow:0 20px 40px rgba(0,0,0,0.14); }
    .dish-card:hover .dish-card-img { transform:scale(1.07); }
    .dish-card-img-wrap { position:relative; width:100%; aspect-ratio:16/10; overflow:hidden; background:var(--sable-fonce); }
    .dish-card-img {
      position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
      transition:transform .7s var(--ease-doux);
    }
    .dish-card-badge {
      position:absolute; top:0.9rem; left:0.9rem;
      background:rgba(0,0,0,0.62); color:#fff;
      font-size:0.68rem; letter-spacing:0.12em; text-transform:uppercase; font-weight:700;
      padding:0.3rem 0.7rem; border-radius:999px; backdrop-filter:blur(6px);
    }
    .dish-card-price {
      position:absolute; top:0.9rem; right:0.9rem;
      background:var(--or); color:var(--encre);
      font-weight:800; font-size:0.85rem; padding:0.3rem 0.75rem;
      border-radius:999px; box-shadow:0 4px 10px rgba(0,0,0,0.18);
    }
    .dish-card-body { padding:1.2rem 1.3rem 1.4rem; flex:1; display:flex; flex-direction:column; }
    .dish-card-body h3 { margin:0 0 0.35rem; font-size:1.22rem; letter-spacing:-0.01em; }
    .dish-card-body .desc {
      margin:0; color:rgba(0,0,0,0.6); font-size:0.91rem; line-height:1.55;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .dish-card-foot {
      display:flex; align-items:center; justify-content:space-between;
      gap:0.6rem; margin-top:1rem; color:rgba(0,0,0,0.55); font-size:0.82rem;
    }
    .dish-card-foot .cal { display:inline-flex; align-items:center; gap:0.3rem; }
    .dish-card-foot .more {
      color:var(--terracotta); font-weight:700;
      display:inline-flex; align-items:center; gap:0.25rem; transition:gap .3s;
    }
    .dish-card:hover .dish-card-foot .more { gap:0.5rem; }

    /* Allergen mini-badges on card */
    .dish-card-allergens {
      display:flex; flex-wrap:wrap; gap:0.3rem; margin-top:0.7rem;
    }
    .mini-badge {
      font-size:0.62rem; font-weight:700; letter-spacing:0.05em;
      padding:0.2rem 0.5rem; border-radius:999px;
      display:inline-flex; align-items:center; gap:0.2rem;
    }
    .mini-badge.high { background:rgba(192,85,42,0.12); color:var(--terracotta-dark); border:1px solid rgba(192,85,42,0.25); }
    .mini-badge.medium { background:rgba(212,175,55,0.15); color:#876606; border:1px solid rgba(212,175,55,0.32); }

    /* === Detail Panel === */
    .dish-detail {
      grid-column:1/-1; background:#fff; border-radius:26px;
      box-shadow:0 18px 60px rgba(0,0,0,0.16); overflow:hidden;
      max-height:0; opacity:0; transform:translateY(-10px);
      transition:max-height .55s var(--ease-doux), opacity .45s ease, transform .55s var(--ease-doux), margin .55s var(--ease-doux);
      margin:0; pointer-events:none;
    }
    .dish-detail.open { max-height:1400px; opacity:1; transform:translateY(0); margin:0.4rem 0 1rem; pointer-events:auto; }
    .dish-detail-inner { display:flex; flex-direction:row; gap:0; }
    .dish-detail-img {
      flex:0 0 46%; min-height:400px;
      background-size:cover; background-position:center;
      background-color:var(--sable-fonce); position:relative;
    }
    .dish-detail-img::after {
      content:""; position:absolute; inset:auto 0 0 0; height:35%;
      background:linear-gradient(to top,rgba(0,0,0,0.38),transparent); pointer-events:none;
    }
    .dish-detail-body {
      flex:1; padding:2.4rem 2.4rem 2.2rem;
      display:flex; flex-direction:column; gap:0.9rem; position:relative;
    }
    .dish-detail-close {
      position:absolute; top:1.2rem; right:1.2rem;
      width:36px; height:36px; border:none; background:rgba(0,0,0,0.06);
      color:var(--encre); border-radius:50%; cursor:pointer;
      display:flex; align-items:center; justify-content:center; font-size:1.1rem;
      transition:background .2s,color .2s,transform .2s;
    }
    .dish-detail-close:hover { background:var(--terracotta); color:#fff; transform:rotate(90deg); }
    .dish-detail-body .category-chip {
      display:inline-flex; align-items:center; gap:0.4rem;
      font-size:0.72rem; letter-spacing:0.22em; text-transform:uppercase;
      color:var(--terracotta); font-weight:700; align-self:flex-start;
    }
    .dish-detail-body .category-chip::before { content:""; width:24px; height:1px; background:var(--terracotta); }
    .dish-detail-body h2 { margin:0; font-size:clamp(1.7rem,3vw,2.2rem); letter-spacing:-0.01em; }
    .dish-detail-body p.desc { margin:0; color:var(--texte); line-height:1.7; font-size:1rem; }
    .dish-detail-meta {
      display:flex; flex-wrap:wrap; gap:1.2rem 2rem; margin-top:0.4rem;
      padding-top:1.2rem; border-top:1px solid rgba(0,0,0,0.07);
    }
    .meta-item { display:flex; flex-direction:column; gap:0.15rem; }
    .meta-item .label { font-size:0.7rem; letter-spacing:0.18em; text-transform:uppercase; color:rgba(0,0,0,0.5); font-weight:700; }
    .meta-item .value { font-family:'Playfair Display',serif; font-size:1.2rem; color:var(--encre); font-weight:700; }
    .meta-item .value.price { color:var(--terracotta); }

    /* Allergen section in detail */
    .allergen-section { margin-top:0.2rem; }
    .allergen-section .alg-title {
      font-size:0.7rem; letter-spacing:0.18em; text-transform:uppercase;
      color:rgba(0,0,0,0.5); font-weight:700; margin-bottom:0.5rem;
    }
    .allergen-tags { display:flex; flex-wrap:wrap; gap:0.4rem; }
    .allergen-tag {
      font-size:0.74rem; font-weight:700; padding:0.28rem 0.65rem;
      border-radius:999px; display:inline-flex; align-items:center; gap:0.3rem;
    }
    .allergen-tag.high { background:rgba(192,85,42,0.12); color:var(--terracotta-dark); border:1px solid rgba(192,85,42,0.3); }
    .allergen-tag.medium { background:rgba(212,175,55,0.15); color:#876606; border:1px solid rgba(212,175,55,0.35); }

    .btn-ingredients {
      align-self:flex-start; margin-top:0.4rem;
      display:inline-flex; align-items:center; gap:0.55rem;
      background:var(--encre); color:#fff; padding:0.82rem 1.4rem;
      border:none; border-radius:999px; font-family:'Lato',sans-serif; font-weight:700;
      font-size:0.92rem; letter-spacing:0.03em; cursor:pointer;
      transition:background .3s,transform .3s,box-shadow .3s;
      box-shadow:0 6px 18px rgba(0,0,0,0.18);
    }
    .btn-ingredients i { font-size:1rem; transition:transform .3s; }
    .btn-ingredients:hover { background:var(--terracotta); transform:translateY(-2px); box-shadow:0 10px 24px rgba(192,85,42,0.32); }
    .btn-ingredients:hover i { transform:rotate(15deg) scale(1.1); }

    .empty-state { text-align:center; padding:4rem 1rem; color:rgba(0,0,0,0.5); grid-column:1/-1; }
    .empty-state i { font-size:3rem; color:var(--terracotta); opacity:0.5; }
    .empty-state h3 { margin:1rem 0 0.4rem; color:var(--encre); }

    /* === Ingredients Modal === */
    .ingredients-modal .modal-dialog { max-width:600px; }
    .ingredients-modal .modal-content { border:none; border-radius:22px; overflow:hidden; box-shadow:0 24px 60px rgba(0,0,0,0.28); }
    .ingredients-modal .modal-header { background:var(--encre); color:#fff; border-bottom:none; padding:1.6rem 1.8rem 1.4rem; }
    .ingredients-modal .modal-header h5 { margin:0; color:#fff; font-size:1.35rem; font-family:'Playfair Display',serif; }
    .ingredients-modal .modal-header .modal-eyebrow { display:block; color:var(--or); font-size:0.7rem; letter-spacing:0.22em; text-transform:uppercase; font-weight:700; margin-bottom:0.3rem; }
    .ingredients-modal .btn-close { filter:invert(1) brightness(2); opacity:0.7; }
    .ingredients-modal .modal-body { padding:1.4rem 1.8rem 1.8rem; max-height:60vh; overflow-y:auto; }
    .ingredients-modal .modal-footer { border-top:1px solid rgba(0,0,0,0.06); padding:1rem 1.8rem; font-size:0.82rem; color:rgba(0,0,0,0.55); }
    .ing-list { list-style:none; padding:0; margin:0; }
    .ing-item {
      display:flex; align-items:center; justify-content:space-between;
      gap:1rem; padding:0.85rem 0; border-bottom:1px solid rgba(0,0,0,0.05);
      animation:fadeInRow .4s ease both;
    }
    .ing-item:last-child { border-bottom:none; }
    .ing-item-name { display:flex; flex-direction:column; gap:0.25rem; }
    .ing-item-name strong { color:var(--encre); font-weight:700; font-size:0.98rem; }
    .ing-item-qty { font-family:'Playfair Display',serif; font-size:1.05rem; color:var(--terracotta); font-weight:700; min-width:60px; text-align:right; }
    .allergen-badge {
      display:inline-flex; align-items:center; gap:0.3rem;
      font-size:0.72rem; font-weight:700; letter-spacing:0.02em;
      padding:0.25rem 0.55rem; border-radius:999px; width:fit-content;
    }
    .allergen-badge.high { background:rgba(192,85,42,0.12); color:var(--terracotta-dark); border:1px solid rgba(192,85,42,0.25); }
    .allergen-badge.medium { background:rgba(212,175,55,0.15); color:#876606; border:1px solid rgba(212,175,55,0.32); }
    .allergen-legend { display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap; }
    @keyframes fadeInRow { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    @media (max-width:768px) {
      .dishes-hero { padding:3.5rem 1.25rem 2.4rem; }
      .dishes-section { padding:3rem 1.25rem 4.5rem; }
      .dish-detail-inner { flex-direction:column; }
      .dish-detail-img { flex:1; min-height:240px; aspect-ratio:16/9; }
      .dish-detail-body { padding:1.6rem 1.5rem 1.5rem; }
      .dish-detail-meta { gap:1rem 1.6rem; }
    }
    @media (max-width:480px) {
      .dishes-grid { gap:1.1rem; }
      .dish-card-body { padding:1rem 1.1rem 1.2rem; }
      .ingredients-modal .modal-body { padding:1rem 1.2rem 1.4rem; }
      .ingredients-modal .modal-header { padding:1.3rem 1.4rem 1.1rem; }
    }
    @media (prefers-reduced-motion:reduce) {
      *,*::before,*::after { animation-duration:0.01ms !important; transition-duration:0.01ms !important; }
    }
  </style>
</head>
<body>

<nav class="top-bar">
  <a href="index.html" class="brand"><i class="bi bi-tree-fill"></i> Royaume du Maroc</a>
  <a href="index.html" class="back-link"><i class="bi bi-arrow-left"></i> Retour</a>
</nav>

<section class="dishes-hero">
  <div class="container">
    <span class="eyebrow">Gastronomie</span>
    <h1>Plats Marocains</h1>
    <p class="lead">Une cuisine millénaire au carrefour des saveurs berbères, arabes, andalouses et méditerranéennes. Explorez les plats emblématiques du royaume.</p>
    <div class="search-wrap">
      <i class="bi bi-search"></i>
      <input type="text" id="searchInput" placeholder="Rechercher un plat, un ingrédient..." autocomplete="off" />
      <button type="button" class="search-clear" id="searchClear" aria-label="Effacer"><i class="bi bi-x-circle-fill"></i></button>
      <div class="search-count" id="searchCount" aria-live="polite"></div>
    </div>
  </div>
</section>

<section class="dishes-section">
  <div class="dishes-grid" id="dishesGrid"></div>
</section>

<div class="modal fade ingredients-modal" id="ingredientsModal" tabindex="-1" aria-labelledby="ingredientsModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <span class="modal-eyebrow">Ingrédients & Allergènes</span>
          <h5 id="ingredientsModalLabel">—</h5>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
      </div>
      <div class="modal-body"><ul class="ing-list" id="ingredientsList"></ul></div>
      <div class="modal-footer">
        <div class="allergen-legend">
          <span class="allergen-badge high">⚠ Allergène prioritaire</span>
          <span class="allergen-badge medium">⚠ Sensibilité possible</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>

  {

    ingredients: [
      { name: 'Lentilles brunes',           qty: '60g'  },

      { name: 'Vermicelles',                qty: '30g', allergen: 'gluten' },
      { name: 'Farine (tedouira)',           qty: '15g', allergen: 'gluten' },

/* ── Helpers ── */
const RISK_UNIQUE = (allergens) => [...new Set(allergens)];

function getCardAllergens(dish) {
  const seen = new Set();
  const out = [];
  dish.ingredients.forEach(ing => {
    if (ing.allergen && !seen.has(ing.allergen)) {
      seen.add(ing.allergen);
      out.push(ing.allergen);
    }
  });
  return out;
}

function allergenTagsHtml(allergens, cls='allergen-tag') {
  if (!allergens.length) return '<span style="color:rgba(0,0,0,0.4);font-size:0.8rem;">Aucun allergène majeur déclaré</span>';
  return allergens.map(a => {
    const r = RISK_LEVELS[a];
    return r ? `<span class="${cls} ${r.level}">${r.label}</span>` : '';
  }).join('');
}

/* ── Grid render ── */
const grid = document.getElementById('dishesGrid');
const ingredientsModalEl = document.getElementById('ingredientsModal');
const bsModal = new bootstrap.Modal(ingredientsModalEl);
let openCard = null;

function renderGrid() {
  grid.innerHTML = DISHES.map(dish => {
    const cardAllergens = getCardAllergens(dish);
    const miniTagsHtml = cardAllergens.length
      ? cardAllergens.map(a => {
          const r = RISK_LEVELS[a];
          return r ? `<span class="mini-badge ${r.level}">${r.label}</span>` : '';
        }).join('')
      : '';
    return `
    <article class="dish-card" data-id="${dish.id}" tabindex="0" role="button"
             aria-expanded="false" aria-label="Voir le détail de ${dish.name}">
      <div class="dish-card-img-wrap">
        <img class="dish-card-img"
             src="${dish.image}"
             alt="${dish.name}"
             style="${dish.imagePosition ? `object-position:${dish.imagePosition};` : ''}"
             loading="lazy" />
        <span class="dish-card-badge">${dish.category}</span>
        <span class="dish-card-price">${dish.price}</span>
      </div>
      <div class="dish-card-body">
        <h3>${dish.name}</h3>
        <p class="desc">${dish.description}</p>
        ${miniTagsHtml ? `<div class="dish-card-allergens">${miniTagsHtml}</div>` : ''}
        <div class="dish-card-foot">
          <span class="cal"><i class="bi bi-fire"></i> ${dish.calories}</span>
          <span class="more">Voir le détail <i class="bi bi-arrow-right"></i></span>
        </div>
      </div>
    </article>`;
  }).join('');
}

/* ── Detail panel ── */
function closeOpenDetail() {
  if (!openCard) return;
  const detail = openCard.nextElementSibling;
  if (detail && detail.classList.contains('dish-detail')) {
    detail.classList.remove('open');
    setTimeout(() => detail.remove(), 600);
  }
  openCard.setAttribute('aria-expanded','false');
  openCard = null;
}

function openDetail(card) {
  const dish = DISHES.find(d => d.id === card.dataset.id);
  if (!dish) return;
  if (openCard && openCard !== card) closeOpenDetail();
  if (openCard === card) { closeOpenDetail(); return; }

  const cardAllergens = getCardAllergens(dish);

  const detail = document.createElement('div');
  detail.className = 'dish-detail';
  detail.innerHTML = `
    <div class="dish-detail-inner">
      <div class="dish-detail-img" style="background-image:url('${dish.image}');${dish.imagePosition?`background-position:${dish.imagePosition};`:''}"></div>
      <div class="dish-detail-body">
        <button class="dish-detail-close" aria-label="Fermer"><i class="bi bi-x-lg"></i></button>
        <span class="category-chip">${dish.category}</span>
        <h2>${dish.name}</h2>
        <p class="desc">${dish.description}</p>
        <div class="dish-detail-meta">
          <div class="meta-item"><span class="label">Prix</span><span class="value price">${dish.price}</span></div>
          <div class="meta-item"><span class="label">Calories</span><span class="value">${dish.calories}</span></div>
          <div class="meta-item"><span class="label">Ingrédients</span><span class="value">${dish.ingredients.length}</span></div>
        </div>
        <div class="allergen-section">
          <div class="alg-title">Allergènes détectés</div>
          <div class="allergen-tags">${allergenTagsHtml(cardAllergens,'allergen-tag')}</div>
        </div>
        <button class="btn-ingredients" data-action="open-ingredients" data-id="${dish.id}">
          <i class="bi bi-flower2"></i> Voir tous les ingrédients
        </button>
      </div>
    </div>`;
  card.insertAdjacentElement('afterend', detail);
  requestAnimationFrame(() => requestAnimationFrame(() => detail.classList.add('open')));
  card.setAttribute('aria-expanded','true');
  openCard = card;
  setTimeout(() => detail.scrollIntoView({ behavior:'smooth', block:'center' }), 80);
}

/* ── Ingredients Modal ── */
function openIngredientsModal(dish) {
  ingredientsModalEl.querySelector('#ingredientsModalLabel').textContent = dish.name;
  const list = ingredientsModalEl.querySelector('#ingredientsList');
  list.innerHTML = dish.ingredients.map((ing, idx) => {
    const risk = ing.allergen ? RISK_LEVELS[ing.allergen] : null;
    const badge = risk ? `<span class="allergen-badge ${risk.level}">${risk.label}</span>` : '';
    return `<li class="ing-item" style="animation-delay:${idx*35}ms">
      <div class="ing-item-name"><strong>${ing.name}</strong>${badge}</div>
      <span class="ing-item-qty">${ing.qty}</span>
    </li>`;
  }).join('');
  bsModal.show();
}

/* ── Event delegation ── */
grid.addEventListener('click', (e) => {
  const ingBtn = e.target.closest('[data-action="open-ingredients"]');
  if (ingBtn) { const dish = DISHES.find(d=>d.id===ingBtn.dataset.id); if(dish) openIngredientsModal(dish); return; }
  const closeBtn = e.target.closest('.dish-detail-close');
  if (closeBtn) { closeOpenDetail(); return; }
  const card = e.target.closest('.dish-card');
  if (card && !card.classList.contains('hidden')) openDetail(card);
});
grid.addEventListener('keydown', (e) => {
  const card = e.target.closest('.dish-card');
  if (card && (e.key==='Enter'||e.key===' ')) { e.preventDefault(); openDetail(card); }
  if (e.key==='Escape' && openCard) closeOpenDetail();
});

/* ── Search ── */
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const searchCount = document.getElementById('searchCount');
const cards = () => Array.from(document.querySelectorAll('.dish-card'));

function normalize(s) { return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function dishMatches(dish, q) {
  if (!q) return true;
  const hay = [dish.name, dish.category, dish.description, ...dish.ingredients.map(i=>i.name)].map(normalize).join(' | ');
  return hay.includes(q);
}

function applyFilter() {
  const q = normalize(searchInput.value.trim());
  let visible = 0;
  cards().forEach(card => {
    const dish = DISHES.find(d=>d.id===card.dataset.id);
    const match = dishMatches(dish, q);
    card.classList.toggle('hidden', !match);
    if (match) visible++;
  });
  const existing = grid.querySelector('.empty-state');
  if (visible===0) {
    if (!existing) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = '<i class="bi bi-search"></i><h3>Aucun plat ne correspond</h3><p>Essayez un autre mot-clé ou un ingrédient (ex. amandes, citron).</p>';
      grid.appendChild(empty);
    }
  } else if (existing) { existing.remove(); }
  searchClear.classList.toggle('visible', !!q);
  searchCount.textContent = q ? `${visible} plat${visible>1?'s':''} trouvé${visible>1?'s':''}` : '';
  if (openCard && openCard.classList.contains('hidden')) closeOpenDetail();
}

searchInput.addEventListener('input', applyFilter);
searchClear.addEventListener('click', () => { searchInput.value=''; applyFilter(); searchInput.focus(); });

renderGrid();
applyFilter();
</script>
